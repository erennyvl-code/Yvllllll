name: yvl
description: "YVL — Premium YouTube Music client with sky theme, bubble lyrics, and ultra-dark mode"
publish_to: 'none'

version: 2.0.1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.1.21
  http: ^1.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  dio: ^5.9.0
  permission_handler: ^12.0.1
  palette_generator: ^0.3.3+7
  receive_sharing_intent: ^1.8.1
  flutter_local_notifications: ^19.5.0
  font_awesome_flutter: ^10.12.0
  flutter_svg: ^2.0.10
  connectivity_plus: ^7.0.0
  sliding_up_panel: ^2.0.0+1
  audio_video_progress_bar: ^2.0.3
  ionicons: ^0.2.2
  fluentui_system_icons: ^1.1.255
  widget_marquee: ^0.0.8
  flutter_cache_manager: ^3.4.1
  scrollable_positioned_list: ^0.3.8
  window_manager: ^0.5.1
  muzoapi: ^0.0.1
  get: ^4.7.3
  audio_service: ^0.18.18
  url_launcher: ^6.3.1
  flutter_lyric: ^3.0.2
  dynamic_color: ^1.8.1
  flutter_animate: ^4.5.2
  youtube_explode_dart: ^2.3.0
  image_picker: ^1.1.2
  app_links: ^3.4.3
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
